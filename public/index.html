<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ 赔率分析查询</title>
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }
    :root {
      --bg-primary: #0b1420;
      --bg-card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --gold: #f0a500;
      --gold-dim: rgba(240,165,0,0.12);
      --text-primary: #e8ecf0;
      --text-secondary: #8a9ab0;
      --text-dim: #556680;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      color: var(--text-primary);
      font-size: 16px;
    }

    /* 顶部 */
    .topbar {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 28px 20px 6px;
    }
    .topbar .logo { font-size: 26px; }
    .topbar h1 { font-size: 22px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.5px; }
    .subtitle { text-align: center; font-size: 14px; color: var(--text-dim); margin-bottom: 20px; }

    .container { max-width: 640px; margin: 0 auto; padding: 0 16px 60px; }

    /* 模式切换 */
    .mode-switch {
      display: flex; gap: 6px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 16px;
    }
    .mode-btn {
      flex: 1;
      padding: 10px 0;
      background: transparent;
      border: none;
      border-radius: 7px;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: var(--gold);
      color: #0b1420;
      font-weight: 600;
    }
    .mode-btn:not(.active):hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }

    /* 搜索区 */
    .search-area {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
    }
    .input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .input-row input {
      flex: 1; height: 42px; padding: 0 13px;
      background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-primary); font-size: 15px;
      outline: none; transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: var(--gold); }
    .input-row input::placeholder { color: var(--text-dim); }
    .vs-badge {
      flex-shrink: 0; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      background: var(--gold-dim); border-radius: 50%;
      color: var(--gold); font-size: 11px; font-weight: 700;
    }
    .or-divider { text-align: center; font-size: 11.5px; color: var(--text-dim); margin-bottom: 8px; }
    .input-single {
      width: 100%; height: 42px; padding: 0 13px;
      background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-primary); font-size: 15px;
      outline: none; transition: border-color 0.2s;
    }
    .input-single:focus { border-color: var(--gold); }
    .input-single::placeholder { color: var(--text-dim); }
    .btn-search {
      width: 100%; height: 44px; margin-top: 12px;
      background: var(--gold); border: none; border-radius: 8px;
      color: #0b1420; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-search:hover { opacity: 0.88; }
    .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }
    .examples { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
    .examples button {
      padding: 5px 12px; background: transparent;
      border: 1px solid var(--border); border-radius: 5px;
      color: var(--text-secondary); font-size: 13px; cursor: pointer;
      transition: all 0.15s;
    }
    .examples button:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

    /* 加载 */
    .loading { display: none; text-align: center; padding: 28px 0; }
    .loading.active { display: block; }
    .dot-pulse { display: inline-flex; gap: 4px; }
    .dot-pulse span {
      width: 6px; height: 6px; background: var(--gold);
      border-radius: 50%; animation: pulse 1.2s infinite ease-in-out;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { transform: scale(0.6); opacity:0.4; } 40% { transform: scale(1); opacity:1; } }
    .loading p { color: var(--text-secondary); font-size: 14px; margin-top: 10px; }

    /* 错误 */
    .error-msg {
      display: none; background: rgba(232,64,64,0.08);
      border: 1px solid rgba(232,64,64,0.2); border-radius: 8px;
      padding: 10px 14px; margin-top: 14px;
      color: #e84040; font-size: 14px; line-height: 1.6;
    }
    .error-msg.active { display: block; }

    /* 结果区 */
    .result-area { display: none; margin-top: 16px; }
    .result-area.active { display: block; }
    .result-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .result-header .match-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--gold-dim); border: 1px solid rgba(240,165,0,0.18);
      border-radius: 6px; padding: 5px 14px;
      font-size: 14px; color: var(--gold); font-weight: 500;
    }
    .result-header .mode-label {
      font-size: 13px; color: var(--text-dim);
      background: rgba(255,255,255,0.04); border-radius: 4px; padding: 4px 10px;
    }
    .result-header .elapsed { font-size: 13px; color: var(--text-dim); }

    .report-box {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
    }
    .report-content {
      padding: 20px; max-height: 75vh; overflow-y: auto;
      font-size: 15px; line-height: 1.9; color: var(--text-primary);
    }
    .report-content::-webkit-scrollbar { width: 4px; }
    .report-content::-webkit-scrollbar-track { background: transparent; }
    .report-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* Markdown 渲染 */
    .report-content h1 { font-size: 19px; color: var(--gold); margin: 16px 0 10px; font-weight: 600; }
    .report-content h2 { font-size: 17px; color: var(--text-primary); margin: 14px 0 8px; font-weight: 600; }
    .report-content h3 { font-size: 16px; color: var(--text-secondary); margin: 10px 0 6px; }
    .report-content p { margin: 5px 0; }
    .report-content table { width:100%; border-collapse: collapse; margin: 10px 0; font-size: 14px; }
    .report-content th {
      background: rgba(240,165,0,0.08); color: var(--gold);
      padding: 5px 7px; text-align: left; font-weight: 500;
      border-bottom: 1px solid rgba(240,165,0,0.12);
    }
    .report-content td { padding: 4px 7px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
    .report-content tr:last-child td { border-bottom: none; }
    .report-content code {
      background: rgba(255,255,255,0.06); padding: 2px 6px;
      border-radius: 3px; font-size: 14px; color: var(--gold);
    }
    .report-content pre {
      background: rgba(0,0,0,0.3); border-radius: 6px;
      padding: 12px; font-size: 14px; line-height: 1.6; color: var(--text-secondary);
      overflow-x: auto; margin: 10px 0;
    }
    .report-content blockquote {
      border-left: 3px solid var(--gold); padding: 6px 12px;
      margin: 10px 0; background: var(--gold-dim);
      border-radius: 0 5px 5px 0; color: var(--text-secondary); font-size: 14px;
    }
    .report-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .report-content ul, .report-content ol { padding-left: 20px; margin: 6px 0; }
    .report-content li { margin: 3px 0; color: var(--text-secondary); font-size: 14px; }
    .source-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.15); font-size: 13px; color: var(--text-dim);
    }
    .footer { text-align: center; padding: 28px 20px 20px; font-size: 13px; color: var(--text-dim); }

    /* 移动端自适应：屏幕宽度小于 768px 时放大字体 */
    @media screen and (max-width: 768px) {
      body { font-size: 17px; }
      .topbar h1 { font-size: 24px; }
      .subtitle { font-size: 15px; }
      .mode-btn { font-size: 16px; padding: 11px 0; }
      .input-row input, .input-single { font-size: 16px; height: 44px; }
      .btn-search { font-size: 17px; height: 46px; }
      .examples button { font-size: 14px; padding: 6px 14px; }
      .result-header .match-tag { font-size: 15px; }
      .result-header .mode-label, .result-header .elapsed { font-size: 14px; }
      .report-content { font-size: 16px; line-height: 2; padding: 20px; }
      .report-content h1 { font-size: 20px; }
      .report-content h2 { font-size: 18px; }
      .report-content h3 { font-size: 17px; }
      .report-content table { font-size: 15px; }
      .report-content pre { font-size: 15px; }
      .report-content li { font-size: 15px; }
      .source-bar { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="logo">⚽</span>
    <h1>赔率分析查询</h1>
  </div>
  <p class="subtitle">输入赛事主客队名，查询 IMA 知识库分析报告</p>

  <div class="container">
    <!-- 模式切换 -->
    <div class="mode-switch">
      <button class="mode-btn active" id="btnModeOdds" onclick="switchMode('odds')">📊 赔率分析</button>
      <button class="mode-btn" id="btnModeBodan" onclick="switchMode('bodan')">🎯 波胆分析</button>
    </div>

    <div class="search-area">
      <div class="input-row">
        <input type="text" id="homeInput" placeholder="主队名称" autocomplete="off">
        <span class="vs-badge">VS</span>
        <input type="text" id="awayInput" placeholder="客队名称" autocomplete="off">
      </div>
      <div class="or-divider">或直接输入</div>
      <input type="text" class="input-single" id="textInput" placeholder="主队 VS 客队" autocomplete="off">
      <button class="btn-search" id="btnQuery" onclick="doQuery()">查询</button>
      <div class="examples" id="examples">
        <button onclick="quickQuery('威尔士','加纳')">威尔士 VS 加纳</button>
        <button onclick="quickQuery('斯达','瓦勒伦加')">斯达 VS 瓦勒伦加</button>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="dot-pulse"><span></span><span></span><span></span></div>
      <p id="loadingText">正在查询知识库...</p>
    </div>

    <div class="error-msg" id="errorBox"></div>

    <div class="result-area" id="resultArea">
      <div class="result-header">
        <div>
          <span class="match-tag" id="matchTag"></span>
          <span class="mode-label" id="resultModeLabel"></span>
        </div>
        <span class="elapsed" id="resultTime"></span>
      </div>
      <div class="report-box">
        <div class="report-content" id="resultContent"></div>
        <div class="source-bar">
          <span id="resultSource"></span>
          <span id="resultKbLabel"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">聊球者 AI 智能分析助手 · 与庄共舞</div>

  <script>
    let currentMode = 'odds'; // 'odds' | 'bodan'

    const $ = id => document.getElementById(id);
    const homeInput = $('homeInput');
    const awayInput = $('awayInput');
    const textInput = $('textInput');
    const btnQuery = $('btnQuery');

    [homeInput, awayInput, textInput].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') doQuery(); });
    });

    function switchMode(mode) {
      currentMode = mode;
      const btnOdds = $('btnModeOdds');
      const btnBodan = $('btnModeBodan');
      const loadingText = $('loadingText');
      if (mode === 'odds') {
        btnOdds.classList.add('active');
        btnBodan.classList.remove('active');
        loadingText.textContent = '正在查询赔率分析知识库...';
      } else {
        btnBodan.classList.add('active');
        btnOdds.classList.remove('active');
        loadingText.textContent = '正在查询波胆分析知识库...';
      }
      // 清空结果
      $('resultArea').classList.remove('active');
      $('errorBox').classList.remove('active');
    }

    function quickQuery(home, away) {
      homeInput.value = home;
      awayInput.value = away;
      textInput.value = '';
      doQuery();
    }

    async function doQuery() {
      const home = homeInput.value.trim();
      const away = awayInput.value.trim();
      const text = textInput.value.trim();

      $('errorBox').classList.remove('active');
      $('resultArea').classList.remove('active');

      if (!home && !away && !text) {
        showError('请输入主队和客队名称');
        return;
      }

      $('loading').classList.add('active');
      btnQuery.disabled = true;

      try {
        const res = await fetch('/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ homeTeam: home, awayTeam: away, text, mode: currentMode }),
        });
        const data = await res.json();

        if (data.success) {
          renderReport(data);
        } else {
          showError(data.error + (data.hint ? '\n\n' + data.hint : ''));
        }
      } catch (err) {
        showError('请求失败：' + err.message);
      } finally {
        $('loading').classList.remove('active');
        btnQuery.disabled = false;
      }
    }

    function renderReport(data) {
      const modeLabel = data.mode === 'bodan' ? '🎯 波胆分析' : '📊 赔率分析';
      const kbLabel = data.mode === 'bodan' ? '数据来源：IMA 波胆分析知识库' : '数据来源：IMA 赔率数据知识库';

      $('matchTag').textContent = '⚽ ' + data.homeTeam + ' VS ' + data.awayTeam;
      $('resultModeLabel').textContent = modeLabel;
      $('resultTime').textContent = '耗时 ' + data.elapsed + 's';
      $('resultSource').textContent = data.sourceFile || '';
      $('resultKbLabel').textContent = kbLabel;

      $('resultContent').innerHTML = renderMarkdown(data.report);

      $('resultArea').classList.add('active');
      setTimeout(() => {
        $('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
    }

    function renderMarkdown(text) {
      // 代码块
      text = text.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');

      // 表格
      text = text.replace(/\|(.+)\|\n\|[-| :]+\|\n([\s\S]*?)(?=\n\n|\n###|\n##|$)/g, (_, header, body) => {
        const ths = header.split('|').filter(c => c.trim()).map(c => '<th>' + mdInline(c.trim()) + '</th>').join('');
        const rows = body.trim().split('\n').map(r => {
          const tds = r.split('|').filter(c => c.trim()).map(c => '<td>' + mdInline(c.trim()) + '</td>').join('');
          return '<tr>' + tds + '</tr>';
        }).join('');
        return '<table><thead><tr>' + ths + '</tr></thead><tbody>' + rows + '</tbody></table>';
      });

      // 标题
      text = text.replace(/^#### (.+)$/gm, '<h3>$1</h3>');
      text = text.replace(/^### (.+)$/gm, '<h2>$1</h2>');
      text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      // 粗体
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

      // 行内代码
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

      // 引用
      text = text.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

      // 分隔线
      text = text.replace(/^---$/gm, '<hr>');

      // 列表
      text = text.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
      text = text.replace(/(<li>.*<\/li>)+/g, '<ul>$&</ul>');

      // 段落
      text = text.replace(/\n\n/g, '</p><p>');
      text = '<p>' + text + '</p>';

      // 清理空段落
      text = text.replace(/<p>\s*<\/p>/g, '');

      return text;
    }

    function mdInline(s) {
      return s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    function showError(msg) {
      $('errorBox').textContent = msg;
      $('errorBox').classList.add('active');
    }
  </script>
</body>
</html>
